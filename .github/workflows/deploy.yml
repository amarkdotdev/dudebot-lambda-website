name: Deploy to S3

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to amark.dev/dudebot
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Deploy to dudebot/ prefix (serves amark.dev/dudebot/)
      - name: Sync to S3 (dudebot/ prefix)
        run: |
          aws s3 sync . s3://${{ secrets.AMARK_S3_BUCKET }}/dudebot/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --cache-control "public,max-age=300"

      # Also upload index.html as dudebot.html for amark.dev/dudebot (no trailing slash)
      - name: Upload root redirect (dudebot.html)
        run: |
          aws s3 cp index.html s3://${{ secrets.AMARK_S3_BUCKET }}/dudebot.html \
            --cache-control "public,max-age=300" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AMARK_CF_DISTRIBUTION_ID }} \
            --paths "/dudebot" "/dudebot/*"
